api:
  insecure: true
  dashboard: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: mastrade-net
  file:
    filename: /config.yml
    watch: true

# Uncomment for Let's Encrypt SSL support
certificatesResolvers:
  letsencrypt:
    acme:
      email: ${CERTIFICATE_EMAIL:-noreply@example.com}
      storage: acme.json
      httpChallenge:
        entryPoint: web

# Global HTTP options
global:
  checkNewVersion: true
  sendAnonymousUsage: false

log:
  level: INFO
  filePath: /var/log/traefik/traefik.log

accessLog:
  filePath: /var/log/traefik/access.log
  format: json
