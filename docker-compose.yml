services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mastrade-backend
    restart: unless-stopped
    volumes:
      - ./backend_data:/data
    environment:
      - DATABASE_URL=sqlite:////data/mastrade.db
      - FLASK_ENV=production
    networks:
      - mastrade_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mastrade-api.rule=Host(`www.flowmarket.io`) && PathPrefix(`/api`)"
      - "traefik.http.routers.mastrade-api.entrypoints=websecure"
      - "traefik.http.routers.mastrade-api.tls.certresolver=myresolver"
      - "traefik.http.routers.mastrade-api.priority=10"
      - "traefik.http.services.mastrade-api.loadbalancer.server.port=5000"
      - "traefik.http.middlewares.api-strip.stripprefix.prefixes=/api"
      - "traefik.http.routers.mastrade-api.middlewares=api-strip"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://www.flowmarket.io/api
    dns:
      - 8.8.8.8
      - 1.1.1.1
    container_name: mastrade-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=https://www.flowmarket.io/api
    networks:
      - mastrade_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mastrade-ui.rule=Host(`www.flowmarket.io`)"
      - "traefik.http.routers.mastrade-ui.entrypoints=websecure"
      - "traefik.http.routers.mastrade-ui.tls.certresolver=myresolver"
      - "traefik.http.routers.mastrade-ui.priority=1"
      - "traefik.http.services.mastrade-ui.loadbalancer.server.port=3000"

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    volumes:
      - ./openclaw-config:/home/node/.openclaw
    environment:
      - OPENCLAW_GATEWAY_BIND=lan
    networks:
      - mastrade_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.openclaw.rule=Host(`openclaw.flowmarket.io`)"
      - "traefik.http.routers.openclaw.entrypoints=websecure"
      - "traefik.http.routers.openclaw.tls.certresolver=myresolver"
      - "traefik.http.routers.openclaw.priority=5"
      - "traefik.http.services.openclaw.loadbalancer.server.port=18789"

networks:
  mastrade_default:
    external: true
    name: mastrade_default