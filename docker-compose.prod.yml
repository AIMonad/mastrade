version: "3.8"

services:
  # -------------------------------------------------
  # TRAEFIK
  # -------------------------------------------------
  traefik:
    image: traefik:latest
    container_name: mastrade-traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - mastrade-net
    ports:
      - "8080:80"      # HTTP
      - "4443:443"     # HTTPS
    environment:
      - CF_API_EMAIL=${CF_API_EMAIL:-}
      - CF_API_KEY=${CF_API_KEY:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/traefik.yml:ro
      - ./traefik/acme.json:/acme.json
      - ./traefik/config.yml:/config.yml:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.traefik.service=api@internal"
      - "traefik.http.routers.traefik.entrypoints=web"
      - "traefik.http.routers.traefik.entrypoints=websecure"

  # -------------------------------------------------
  # BACKEND – Flask API
  # -------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mastrade-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite:////data/mastrade.db
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend/data:/data
      - ./backend/logs:/app/logs
    networks:
      - mastrade-net
    expose:
      - 5000
    labels:
      # *** API router – matches any request that comes to this VPS (IP or localhost) and starts with /api ***
      - "traefik.enable=true"
      - "traefik.http.routers.backend-api.rule=Host(`72.62.82.1`, `localhost`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend-api.entrypoints=web"
      - "traefik.http.routers.backend-api.entrypoints=websecure"
      - "traefik.http.routers.backend-api.priority=10"                     # High priority
      - "traefik.http.routers.backend-api.service=backend-api-service"
      - "traefik.http.services.backend-api-service.loadbalancer.server.port=5000"
      # Strip the '/api' prefix before forwarding to Flask
      - "traefik.http.middlewares.backend-api-stripprefix.stripprefix.prefixes=/api"
      - "traefik.http.routers.backend-api.middlewares=backend-api-stripprefix@docker"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/trades"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # -------------------------------------------------
  # FRONTEND – Next.js/React UI
  # -------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=/api          # <-- build‑time env var
    container_name: mastrade-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=/api
    networks:
      - mastrade-net
    expose:
      - 3000
    labels:
      # Frontend catches everything **except** the higher‑priority /api routes
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`72.62.82.1`, `localhost`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.priority=5"              # Lower than API
      - "traefik.http.routers.frontend.service=frontend-service"
      - "traefik.http.services.frontend-service.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  mastrade-net:
    driver: bridge
