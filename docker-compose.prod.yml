version: "3.8"

services:
  # -------------------------------------------------
  # BACKEND – Flask API
  # -------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mastrade-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite:////data/mastrade.db
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend/data:/data
      - ./backend/logs:/app/logs
    networks:
      - solfun_default # Just the name here
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mastrade-api.rule=Host(`72.62.82.1`) && PathPrefix(`/api`)"
      - "traefik.http.routers.mastrade-api.entrypoints=web"
      - "traefik.http.middlewares.mastrade-strip.stripprefix.prefixes=/api"
      - "traefik.http.routers.mastrade-api.middlewares=mastrade-strip"
      - "traefik.http.services.mastrade-api.loadbalancer.server.port=5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/trades"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # -------------------------------------------------
  # FRONTEND – Next.js/React UI
  # -------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=/api          # <-- build‑time env var
    container_name: mastrade-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=/api
    networks:
      - solfun_default
    expose:
      - 3000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mastrade-frontend.rule=PathPrefix(/)"
      - "traefik.http.routers.mastrade-frontend.priority=1"
      - "traefik.http.routers.mastrade-frontend.entrypoints=web"
      # REMOVE websecure for now until we confirm the IP works on HTTP
      - "traefik.http.services.mastrade-frontend.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  solfun_default:
    external: true
