services:
  # -------------------------------------------------
  # TRAEFIK (unchanged – keep your existing block)
  # -------------------------------------------------
  traefik:
    image: traefik:latest
    container_name: mastrade-traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    networks:
      - mastrade-net
    ports:
      - "8080:80"
      - "4443:443"
    environment:
      - CF_API_EMAIL=${CF_API_EMAIL:-}
      - CF_API_KEY=${CF_API_KEY:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/traefik.yml:ro
      - ./traefik/acme.json:/acme.json
      - ./traefik/config.yml:/config.yml:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik.rule=Host(`traefik.localhost`)"
      - "traefik.http.routers.traefik.service=api@internal"

  # -------------------------------------------------
  # BACKEND – API service
  # -------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mastrade-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=sqlite:////data/mastrade.db
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend/data:/data
      - ./backend/logs:/app/logs
    networks:
      - mastrade-net
    expose:
      - 5000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend-api.rule=Host(`72.62.82.1`, `localhost`) && PathPrefix(`/api`)"
      - "traefik.http.routers.backend-api.entrypoints=web"
      - "traefik.http.routers.backend-api.entrypoints=websecure"
      - "traefik.http.routers.backend-api.priority=10"
      - "traefik.http.routers.backend-api.service=backend-api-service"
      - "traefik.http.services.backend-api-service.loadbalancer.server.port=5000"
      - "traefik.http.middlewares.backend-api-stripprefix.stripprefix.prefixes=/api"
      - "traefik.http.routers.backend-api.middlewares=backend-api-stripprefix@docker"
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/trades"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # -------------------------------------------------
  # FRONTEND – React/Next app
  # -------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=/api     # <-- move args here
    container_name: mastrade-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=/api
    networks:
      - mastrade-net
    expose:
      - 3000
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`72.62.82.1`, `localhost`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.priority=5"
      - "traefik.http.routers.frontend.service=frontend-service"
      - "traefik.http.services.frontend-service.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  mastrade-net:
    driver: bridge
